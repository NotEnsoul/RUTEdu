name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─── Android ───────────────────────────────────────────────────────────────
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Compute version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "${TAG}.0.0"
          echo "VERSION_NAME=${TAG}" >> $GITHUB_ENV
          echo "VERSION_CODE=$(( (MAJOR * 10000) + (MINOR * 100) + (PATCH) ))" >> $GITHUB_ENV

      # ── Signing (optional) ─────────────────────────────────────────────────
      # Set these secrets in GitHub → Settings → Secrets → Actions:
      #   KEYSTORE_BASE64   – base64-encoded .jks file  (openssl base64 -in key.jks)
      #   KEY_ALIAS         – key alias
      #   KEY_PASSWORD      – key password
      #   STORE_PASSWORD    – keystore password
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Build release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -f keystore.jks ]; then
            ./gradlew :composeApp:assembleRelease \
              -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
              -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
              -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
              -Pandroid.injected.signing.key.password="$KEY_PASSWORD"
          else
            ./gradlew :composeApp:assembleRelease
          fi

      - name: Rename APK with tag version
        run: |
          TAG=${GITHUB_REF_NAME}
          mv composeApp/build/outputs/apk/release/composeApp-release*.apk \
             composeApp/build/outputs/apk/release/RUTEdu-${TAG}.apk || \
          mv composeApp/build/outputs/apk/release/*.apk \
             composeApp/build/outputs/apk/release/RUTEdu-${TAG}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: composeApp/build/outputs/apk/release/RUTEdu-*.apk

  # ─── iOS ───────────────────────────────────────────────────────────────────
  build-ios:
    name: Build iOS IPA
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Kotlin/Native framework
        run: ./gradlew :composeApp:linkReleaseFrameworkIosArm64

      # ── Signing (optional) ─────────────────────────────────────────────────
      # Set these secrets in GitHub → Settings → Secrets → Actions:
      #   IOS_CERTIFICATE_BASE64   – base64-encoded .p12 certificate
      #   IOS_CERTIFICATE_PASSWORD – .p12 password
      #   IOS_PROVISIONING_PROFILE – base64-encoded .mobileprovision file
      #   IOS_TEAM_ID              – Apple Developer Team ID (e.g. AB12CD34EF)
      - name: Import certificate and provisioning profile
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
        run: |
          KEYCHAIN_PASSWORD=$(uuidgen)
          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain

          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$IOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$IOS_PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision

      - name: Build archive (signed)
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath build/RUTEdu.xcarchive \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            -allowProvisioningUpdates

      - name: Export IPA
        if: ${{ env.IOS_CERTIFICATE_BASE64 != '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/RUTEdu.xcarchive \
            -exportPath build/ipa \
            -exportOptionsPlist ExportOptions.plist

          TAG=${GITHUB_REF_NAME}
          mv build/ipa/*.ipa build/ipa/RUTEdu-${TAG}.ipa

      - name: Build archive (unsigned, no signing secrets)
        if: ${{ env.IOS_CERTIFICATE_BASE64 == '' }}
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
        run: |
          TAG=${GITHUB_REF_NAME}
          xcodebuild archive \
            -project iosApp/iosApp.xcodeproj \
            -scheme iosApp \
            -configuration Release \
            -archivePath build/RUTEdu.xcarchive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO || true
          # Zip the xcarchive as artifact when no signing is available
          cd build && zip -r "RUTEdu-${TAG}-xcarchive.zip" RUTEdu.xcarchive

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-build
          path: |
            build/ipa/RUTEdu-*.ipa
            build/RUTEdu-*-xcarchive.zip

  # ─── GitHub Release ────────────────────────────────────────────────────────
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-android, build-ios]
    permissions:
      contents: write

    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-apk
          path: release-files/

      - name: Download iOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ios-build
          path: release-files/

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RUTEdu ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
          files: release-files/*
