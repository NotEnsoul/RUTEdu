name: F-Droid Repo Deploy

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Decode APK keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > keystore.jks

      - name: Compute version from tag
        run: |
          TAG=${GITHUB_REF_NAME#v}
          MAJOR=$(echo "$TAG" | cut -d. -f1)
          MINOR=$(echo "$TAG" | cut -d. -f2)
          PATCH=$(echo "$TAG" | cut -d. -f3)
          MAJOR=${MAJOR:-0}; MINOR=${MINOR:-0}; PATCH=${PATCH:-0}
          echo "VERSION_NAME=${TAG}" >> $GITHUB_ENV
          echo "VERSION_CODE=$(( (MAJOR * 10000) + (MINOR * 100) + PATCH ))" >> $GITHUB_ENV

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          ./gradlew :composeApp:assembleRelease \
            -Pandroid.injected.signing.store.file="$KEYSTORE_PATH" \
            -Pandroid.injected.signing.store.password="$STORE_PASSWORD" \
            -Pandroid.injected.signing.key.alias="$KEY_ALIAS" \
            -Pandroid.injected.signing.key.password="$KEY_PASSWORD"

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME}
          mv composeApp/build/outputs/apk/release/*.apk \
             composeApp/build/outputs/apk/release/RUTEdu-${TAG}.apk

      - name: Install fdroidserver
        run: |
          sudo add-apt-repository ppa:fdroid/fdroidserver -y
          sudo apt-get update -qq
          sudo apt-get install -y fdroidserver

      - name: Checkout fdroid branch
        uses: actions/checkout@v4
        with:
          ref: fdroid
          path: fdroid-repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy APK to repo
        run: cp composeApp/build/outputs/apk/release/RUTEdu-*.apk fdroid-repo/repo/

      - name: Decode F-Droid keystore
        env:
          FDROID_KEYSTORE_BASE64: ${{ secrets.FDROID_KEYSTORE_BASE64 }}
        run: echo "$FDROID_KEYSTORE_BASE64" | base64 --decode > fdroid-repo/keystore.jks

      - name: Update F-Droid index
        working-directory: fdroid-repo
        env:
          FDROID_KEY_PASSWORD: ${{ secrets.FDROID_KEY_PASSWORD }}
        run: fdroid update --create-metadata --verbose

      - name: Deploy to fdroid branch
        working-directory: fdroid-repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "F-Droid repo update ${{ github.ref_name }}"
          git push
